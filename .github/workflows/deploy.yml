name: Build JFC site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-jfc-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Verify output
        run: |
          test -f dist/index.html
          test -f dist/style.css
          test -f dist/assets/mobile-fixes.css
          test -d dist/assets/photos
          test -f dist/services/index.html
          test -f dist/realisations/index.html
          test -f dist/a-propos/index.html
          test -f dist/contact/index.html
          test -f dist/devis/index.html
          test ! -e dist/avant-apres/index.html
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jfc-site-dist
          if-no-files-found: error
          path: dist
